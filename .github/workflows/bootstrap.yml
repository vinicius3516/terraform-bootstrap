name: Bootstrap Workflow
on:
    workflow_call:
        inputs:
            environment:
                description: 'Environment to bootstrap'
                required: true
                type: string
            region:
                description: 'AWS region to use'
                required: true
                type: string
            github_run_number:
                description: 'GitHub Run Number to use for naming resources'
                required: true
                type: string
        secrets:
            AWS_ACCESS_KEY_ID:
                description: 'AWS Access Key ID'
                required: true
            AWS_SECRET_ACCESS_KEY:
                description: 'AWS Secret Access Key'
                required: true

jobs:
    bootstrap:
        runs-on: ubuntu-latest
        environment: ${{ github.event.inputs.environment }}
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}
          TF_VAR_aws_region: ${{ github.event.inputs.region }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                repository: vinicius3516/terraform-bootstrap
                ref: main

            - name: Set Up AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4.1.0
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ inputs.region }}

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v2

            - name: Initialize Terraform
              run: terraform init

            - name: Terraform Validate
              run: terraform validate

            - name: Terraform Format
              run: terraform fmt -check

            - name: Plan Terraform
              run: |
                terraform plan -out=tfplan \
                  -var="environment=${{ github.event.inputs.environment }}" \
                  -var="aws_region=${{ github.event.inputs.region }}" \
                  -var="unique_id=${{ github.event.inputs.github_run_number }}"

            - name: Terraform Apply
              run: terraform apply -auto-approve tfplan

            
